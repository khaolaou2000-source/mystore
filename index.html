<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitalis</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

header{
padding:50px 20px;
text-align:center;
background:linear-gradient(180deg,#000,#111);
}

h1{
font-size:42px;
color:#d4af37;
margin-bottom:15px;
}

p{
color:#ddd;
font-size:18px;
line-height:1.8;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#d4af37;
color:black;
font-weight:bold;
text-decoration:none;
border-radius:10px;
font-size:18px;
}

section{
padding:50px 20px;
max-width:1000px;
margin:auto;
}

.card{
background:#181818;
padding:25px;
border-radius:15px;
margin-top:20px;
border:1px solid #333;
}

h2{
color:#d4af37;
margin-bottom:15px;
}
</style>

</head>

<body>

<header>

<h1>Vitalis</h1>

<p>
عناية رجالية بتصميم فاخر وجودة عالية.
</p>

<a href="#" class="btn">
اطلب الآن
</a>

</header>

<section>

<div class="card">
<h2>لماذا Vitalis؟</h2>

<p>
منتج بعناية فائقة مع تصميم فاخر وتغليف سري وتوصيل لجميع المدن المغربية.
</p>

</div>

<div class="card">
<h2>التوصيل</h2>

<p>
الدفع عند الاستلام مع تغليف سري وسريع.
</p>

</div>

</section>

</body>
</html>
